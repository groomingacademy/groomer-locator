<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groomer Locator</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f7f5f1;
color:#2b2338;
}

header{
background:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.logo{
height:60px;
}

.title{
font-size:14px;
letter-spacing:2px;
text-transform:uppercase;
color:#777;
}

.globe{
font-size:24px;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:280px 1fr 400px;
gap:24px;
padding:24px;
}

.panel{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.filter{
margin-bottom:14px;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
}

.map{
height:700px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#999;
}

.card{
border:1px solid #eee;
border-radius:16px;
padding:16px;
margin-bottom:16px;
}

.card img{
width:100%;
border-radius:12px;
}

.badge{
display:inline-block;
background:#c9a55c;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-top:8px;
}

@media(max-width:1000px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>
<body>

<header>

<div>
<div class="title">Grooming Academy</div>
<h2>Groomer Locator</h2>
</div>

<div class="globe">🌐</div>

</header>

<div class="container">

<div class="panel">

<h3>Filtry</h3>

<div class="filter">📍 Lokalita</div>
<div class="filter">🏆 Výstavní úprava</div>
<div class="filter">✂️ Salonní úprava</div>
<div class="filter">✨ Asijský styl</div>
<div class="filter">🫧 SPA procedury</div>
<div class="filter">🐩 Plemeno</div>

</div>

<div class="panel map">

MAPA ČR

</div>

<div class="panel">

<h3>Nalezení groomeři</h3>

<div class="card">

<img src="https://placehold.co/400x250">

<h3>Petra Nováková</h3>

<p>Olomouc</p>

<div class="badge">Výstavní úprava</div>

</div>

<div class="card">

<img src="https://placehold.co/400x250">

<h3>Lucie Dvořáková</h3>

<p>Praha</p>

<div class="badge">Salonní úprava</div>

</div>

</div>

</div>

</body>
</html>
